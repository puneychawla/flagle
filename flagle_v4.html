
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;overflow-x:hidden;}
#fw{
  font-family:'Clear Sans','Helvetica Neue',Arial,sans-serif;
  background:#fff;color:#1a1a1b;
  display:flex;flex-direction:column;align-items:center;
  width:100%;margin:0 auto;
  border:1px solid #d3d6da;border-radius:4px;overflow:hidden;
}
#fhdr{
  width:100%;border-bottom:1px solid #d3d6da;
  display:flex;flex-direction:column;align-items:center;
  padding:clamp(8px,2vw,12px);background:#fff;
}
#fhdr h1{font-size:clamp(20px,5vw,26px);font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#1a1a1b;}
#fhdr .sub{font-size:clamp(10px,2.5vw,12px);color:#787c7e;margin-top:3px;text-align:center;}

#result-panel{display:none;flex-direction:column;align-items:center;gap:10px;padding:clamp(12px,3vw,16px);width:100%;border-bottom:1px solid #d3d6da;background:#fff;}
#result-panel.show{display:flex;}
#rp-title{font-size:clamp(12px,3vw,15px);font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#1a1a1b;}
#rp-flag{font-size:clamp(40px,10vw,56px);line-height:1;}
#rp-name{font-size:clamp(15px,4vw,20px);font-weight:700;color:#1a1a1b;text-align:center;}
#rp-stats{display:flex;gap:clamp(16px,4vw,28px);}
.rst-n{font-size:clamp(20px,5vw,28px);font-weight:700;color:#1a1a1b;text-align:center;}
.rst-l{font-size:clamp(9px,2vw,11px);color:#787c7e;text-transform:uppercase;text-align:center;}
#rp-next{font-size:clamp(10px,2.5vw,12px);color:#787c7e;}
#btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.rp-btn{
  border:none;border-radius:4px;
  font-family:inherit;font-size:clamp(12px,3vw,14px);font-weight:700;
  letter-spacing:1px;padding:clamp(10px,2.5vw,13px) clamp(16px,4vw,24px);
  cursor:pointer;text-transform:uppercase;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
#rp-daily{background:#6aaa64;color:#fff;}
#rp-daily:hover{background:#538d4e;}
#rp-more{background:#fff;color:#1a1a1b;border:2px solid #1a1a1b !important;}
#rp-more:hover{background:#f6f6f7;}

#flag-area{
  padding:clamp(10px,3vw,16px);
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(8px,2vw,12px);width:100%;
}

#flag-wrap{
  position:relative;
  width:min(360px,90vw);
  height:min(200px,50vw);
  border:1px solid #d3d6da;border-radius:4px;
  overflow:hidden;background:#888;
  flex-shrink:0;
}
#flag-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;display:block;
}
#flag-overlay{
  position:absolute;inset:0;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:0;
}
.fog-cell{
  background:#1a1a1b;
  transition:opacity 0.35s ease;
}

#attempt-dots{display:flex;gap:clamp(5px,1.5vw,8px);}
.adot{
  width:clamp(9px,2.5vw,12px);height:clamp(9px,2.5vw,12px);
  border-radius:50%;background:#d3d6da;border:1px solid #878a8c;
}
.adot.wrong{background:#c9333a;}
.adot.correct{background:#6aaa64;}
.adot.active{background:#878a8c;}

#toast{
  font-size:clamp(12px,3vw,13px);font-weight:700;
  background:#1a1a1b;color:#fff;border-radius:4px;
  padding:7px 14px;opacity:0;transition:opacity .25s;
  text-align:center;min-height:30px;width:92%;
}
#toast.show{opacity:1;}

#search-wrap{width:min(380px,92vw);position:relative;}
#country-input{
  width:100%;padding:clamp(9px,2.5vw,11px) 14px;
  font-size:clamp(14px,3.5vw,15px);font-family:inherit;
  border:2px solid #d3d6da;border-radius:4px;
  outline:none;color:#1a1a1b;background:#fff;
  -webkit-appearance:none;
}
#country-input:focus{border-color:#878a8c;}
#dropdown{
  display:none;position:absolute;top:100%;left:0;right:0;
  background:#fff;border:1px solid #d3d6da;border-top:none;
  border-radius:0 0 4px 4px;max-height:220px;overflow-y:auto;z-index:10;
}
#dropdown.show{display:block;}
.dd-item{
  padding:clamp(10px,2.5vw,12px) 14px;
  font-size:clamp(13px,3.5vw,14px);cursor:pointer;color:#1a1a1b;
}
.dd-item:hover,.dd-item.hi{background:#f6f6f7;}

#guess-history{width:min(380px,92vw);display:flex;flex-direction:column;gap:5px;margin-top:2px;}
.gh-row{
  display:flex;align-items:center;gap:8px;
  padding:clamp(7px,2vw,9px) 10px;
  border-radius:4px;font-size:clamp(12px,3vw,13px);
}
.gh-row.correct-row{background:#d4edda;}
.gh-row.wrong-row{background:#fde8e8;}
.gh-flag{font-size:clamp(16px,4vw,20px);line-height:1;flex-shrink:0;}
.gh-name{flex:1;font-weight:500;color:#1a1a1b;}

#submit-btn{
  background:#1a1a1b;color:#fff;border:none;border-radius:4px;
  font-family:inherit;font-size:clamp(13px,3.5vw,15px);font-weight:700;
  padding:clamp(11px,3vw,13px) clamp(24px,6vw,32px);
  cursor:pointer;letter-spacing:1px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  width:min(380px,92vw);
}
#submit-btn:hover{background:#333;}
#submit-btn:disabled{background:#d3d6da;color:#878a8c;cursor:default;}
</style>

<div id="fw">
  <div id="fhdr">
    <h1>Flagle</h1>
    <div class="sub">Guess the flag &middot; 6 attempts &middot; a tile reveals each wrong guess</div>
  </div>

  <div id="result-panel">
    <div id="rp-title"></div>
    <div id="rp-flag"></div>
    <div id="rp-name"></div>
    <div id="rp-stats"></div>
    <div id="rp-next"></div>
    <div id="btn-row">
      <button id="rp-more" class="rp-btn">Play More</button>
      <button id="rp-daily" class="rp-btn">New Daily</button>
    </div>
  </div>

  <div id="flag-area">
    <div id="flag-wrap">
      <img id="flag-img" alt="Mystery flag" />
      <div id="flag-overlay"></div>
    </div>
    <div id="attempt-dots"></div>
    <div id="toast"></div>
    <div id="search-wrap">
      <input id="country-input" type="text" placeholder="Type a country name..." autocomplete="off" spellcheck="false" />
      <div id="dropdown"></div>
    </div>
    <div id="guess-history"></div>
    <button id="submit-btn" disabled>Guess</button>
  </div>
</div>

<script>
var COUNTRIES=[
  ["AF","Afghanistan"],["AL","Albania"],["DZ","Algeria"],["AD","Andorra"],["AO","Angola"],
  ["AG","Antigua and Barbuda"],["AR","Argentina"],["AM","Armenia"],["AU","Australia"],
  ["AT","Austria"],["AZ","Azerbaijan"],["BS","Bahamas"],["BH","Bahrain"],["BD","Bangladesh"],
  ["BB","Barbados"],["BY","Belarus"],["BE","Belgium"],["BZ","Belize"],["BJ","Benin"],
  ["BT","Bhutan"],["BO","Bolivia"],["BA","Bosnia and Herzegovina"],["BW","Botswana"],
  ["BR","Brazil"],["BN","Brunei"],["BG","Bulgaria"],["BF","Burkina Faso"],["BI","Burundi"],
  ["CV","Cape Verde"],["KH","Cambodia"],["CM","Cameroon"],["CA","Canada"],
  ["CF","Central African Republic"],["TD","Chad"],["CL","Chile"],["CN","China"],
  ["CO","Colombia"],["KM","Comoros"],["CG","Congo"],["CD","DR Congo"],["CR","Costa Rica"],
  ["HR","Croatia"],["CU","Cuba"],["CY","Cyprus"],["CZ","Czech Republic"],["DK","Denmark"],
  ["DJ","Djibouti"],["DM","Dominica"],["DO","Dominican Republic"],["EC","Ecuador"],
  ["EG","Egypt"],["SV","El Salvador"],["GQ","Equatorial Guinea"],["ER","Eritrea"],
  ["EE","Estonia"],["SZ","Eswatini"],["ET","Ethiopia"],["FJ","Fiji"],["FI","Finland"],
  ["FR","France"],["GA","Gabon"],["GM","Gambia"],["GE","Georgia"],["DE","Germany"],
  ["GH","Ghana"],["GR","Greece"],["GD","Grenada"],["GT","Guatemala"],["GN","Guinea"],
  ["GW","Guinea-Bissau"],["GY","Guyana"],["HT","Haiti"],["HN","Honduras"],["HU","Hungary"],
  ["IS","Iceland"],["IN","India"],["ID","Indonesia"],["IR","Iran"],["IQ","Iraq"],
  ["IE","Ireland"],["IL","Israel"],["IT","Italy"],["JM","Jamaica"],["JP","Japan"],
  ["JO","Jordan"],["KZ","Kazakhstan"],["KE","Kenya"],["KI","Kiribati"],["KW","Kuwait"],
  ["KG","Kyrgyzstan"],["LA","Laos"],["LV","Latvia"],["LB","Lebanon"],["LS","Lesotho"],
  ["LR","Liberia"],["LY","Libya"],["LI","Liechtenstein"],["LT","Lithuania"],["LU","Luxembourg"],
  ["MG","Madagascar"],["MW","Malawi"],["MY","Malaysia"],["MV","Maldives"],["ML","Mali"],
  ["MT","Malta"],["MH","Marshall Islands"],["MR","Mauritania"],["MU","Mauritius"],
  ["MX","Mexico"],["FM","Micronesia"],["MD","Moldova"],["MC","Monaco"],["MN","Mongolia"],
  ["ME","Montenegro"],["MA","Morocco"],["MZ","Mozambique"],["MM","Myanmar"],["NA","Namibia"],
  ["NR","Nauru"],["NP","Nepal"],["NL","Netherlands"],["NZ","New Zealand"],["NI","Nicaragua"],
  ["NE","Niger"],["NG","Nigeria"],["NO","Norway"],["OM","Oman"],["PK","Pakistan"],
  ["PW","Palau"],["PA","Panama"],["PG","Papua New Guinea"],["PY","Paraguay"],["PE","Peru"],
  ["PH","Philippines"],["PL","Poland"],["PT","Portugal"],["QA","Qatar"],["RO","Romania"],
  ["RU","Russia"],["RW","Rwanda"],["KN","Saint Kitts and Nevis"],["LC","Saint Lucia"],
  ["VC","Saint Vincent and the Grenadines"],["WS","Samoa"],["SM","San Marino"],
  ["ST","Sao Tome and Principe"],["SA","Saudi Arabia"],["SN","Senegal"],["RS","Serbia"],
  ["SC","Seychelles"],["SL","Sierra Leone"],["SG","Singapore"],["SK","Slovakia"],
  ["SI","Slovenia"],["SB","Solomon Islands"],["SO","Somalia"],["ZA","South Africa"],
  ["SS","South Sudan"],["ES","Spain"],["LK","Sri Lanka"],["SD","Sudan"],["SR","Suriname"],
  ["SE","Sweden"],["CH","Switzerland"],["SY","Syria"],["TW","Taiwan"],["TJ","Tajikistan"],
  ["TZ","Tanzania"],["TH","Thailand"],["TL","Timor-Leste"],["TG","Togo"],["TO","Tonga"],
  ["TT","Trinidad and Tobago"],["TN","Tunisia"],["TR","Turkey"],["TM","Turkmenistan"],
  ["TV","Tuvalu"],["UG","Uganda"],["UA","Ukraine"],["AE","United Arab Emirates"],
  ["GB","United Kingdom"],["US","United States"],["UY","Uruguay"],["UZ","Uzbekistan"],
  ["VU","Vanuatu"],["VE","Venezuela"],["VN","Vietnam"],["YE","Yemen"],["ZM","Zambia"],
  ["ZW","Zimbabwe"],["KP","North Korea"],["KR","South Korea"],["MK","North Macedonia"]
];

function getFlagEmoji(code){
  return code.toUpperCase().split('').map(function(c){return String.fromCodePoint(0x1F1E6-65+c.charCodeAt(0));}).join('');
}
function getFlagUrl(code){return 'https://flagcdn.com/w640/'+code.toLowerCase()+'.png';}

var MAX=6;
var answer,answerIdx,guesses,over,selCountry,ddFocusIdx,playMoreMode,usedIndices;
var stats={played:0,won:0,streak:0};
var countdownIv=null;
var currentMatches=[];

function getDayIndex(){
  var now=new Date(),m=new Date(now.getFullYear(),now.getMonth(),now.getDate()),e=new Date(2024,0,1);
  return Math.floor((m-e)/86400000);
}
function getSecsUntilMidnight(){
  var now=new Date(),n=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1);
  return Math.floor((n-now)/1000);
}
function fmt(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;}

function pickAnswer(random){
  var idx;
  if(random){
    var avail=[];
    for(var i=0;i<COUNTRIES.length;i++){if(usedIndices.indexOf(i)===-1)avail.push(i);}
    if(!avail.length){usedIndices=[];avail=COUNTRIES.map(function(_,i){return i;});}
    idx=avail[Math.floor(Math.random()*avail.length)];
  } else {
    idx=getDayIndex()%COUNTRIES.length;
  }
  usedIndices.push(idx);
  answerIdx=idx;
  answer=COUNTRIES[idx];
}

function startGame(random){
  guesses=[];over=false;selCountry=null;ddFocusIdx=-1;currentMatches=[];
  playMoreMode=!!random;
  if(countdownIv){clearInterval(countdownIv);countdownIv=null;}
  document.getElementById('result-panel').classList.remove('show');
  var inp=document.getElementById('country-input');
  inp.value='';inp.disabled=false;
  document.getElementById('submit-btn').disabled=true;
  document.getElementById('dropdown').classList.remove('show');
  document.getElementById('dropdown').innerHTML='';
  document.getElementById('guess-history').innerHTML='';
  document.getElementById('toast').classList.remove('show');
  pickAnswer(random);
  document.getElementById('flag-img').src=getFlagUrl(answer[0]);
  renderDots();renderFog();
}

function renderDots(){
  var d=document.getElementById('attempt-dots');d.innerHTML='';
  for(var i=0;i<MAX;i++){
    var dot=document.createElement('div');dot.className='adot';
    if(i<guesses.length){dot.classList.add(guesses[i].correct?'correct':'wrong');}
    else if(i===guesses.length&&!over){dot.classList.add('active');}
    d.appendChild(dot);
  }
}

function renderFog(){
  var overlay=document.getElementById('flag-overlay');
  overlay.innerHTML='';
  var total=6;
  var order=[];
  for(var i=0;i<total;i++)order.push(i);
  var seed=answerIdx*17;
  order.sort(function(a,b){return((a*31+seed)%97)-((b*31+seed)%97);});
  var revealSet=new Set();
  for(var i=0;i<guesses.length;i++)revealSet.add(order[i]);
  for(var i=0;i<total;i++){
    var cell=document.createElement('div');
    cell.className='fog-cell';
    if(revealSet.has(i)||over){
      cell.style.opacity='0';
      cell.style.pointerEvents='none';
    }
    overlay.appendChild(cell);
  }
}

function submitGuess(){
  if(!selCountry||over)return;
  var correct=selCountry[0]===answer[0];
  guesses.push({country:selCountry,correct:correct});
  addGuessRow(selCountry,correct);
  renderDots();renderFog();
  selCountry=null;ddFocusIdx=-1;currentMatches=[];
  document.getElementById('country-input').value='';
  document.getElementById('submit-btn').disabled=true;
  document.getElementById('dropdown').classList.remove('show');
  document.getElementById('dropdown').innerHTML='';
  if(correct){endGame(true);}
  else if(guesses.length>=MAX){endGame(false);}
  else{showToast('Wrong! '+(MAX-guesses.length)+' guess'+(MAX-guesses.length===1?'':'es')+' remaining');}
}

function addGuessRow(country,correct){
  var h=document.getElementById('guess-history');
  var row=document.createElement('div');
  row.className='gh-row '+(correct?'correct-row':'wrong-row');
  var icon=correct
    ?'<i class="ti ti-check" style="color:#2d7a3a;font-size:16px"></i>'
    :'<i class="ti ti-x" style="color:#c9333a;font-size:16px"></i>';
  row.innerHTML='<span class="gh-flag">'+getFlagEmoji(country[0])+'</span><span class="gh-name">'+country[1]+'</span>'+icon;
  h.appendChild(row);
}

function endGame(won){
  over=true;stats.played++;
  if(won){stats.won++;stats.streak++;}else{stats.streak=0;}
  document.getElementById('rp-title').textContent=won?['Genius!','Excellent!','Great!','Nice!','Close!','Phew!'][guesses.length-1]:'Better luck next time!';
  document.getElementById('rp-flag').textContent=getFlagEmoji(answer[0]);
  document.getElementById('rp-name').textContent=answer[1];
  var wp=stats.played?Math.round(stats.won/stats.played*100):0;
  document.getElementById('rp-stats').innerHTML=
    '<div><div class="rst-n">'+stats.played+'</div><div class="rst-l">Played</div></div>'+
    '<div><div class="rst-n">'+wp+'</div><div class="rst-l">Win %</div></div>'+
    '<div><div class="rst-n">'+stats.streak+'</div><div class="rst-l">Streak</div></div>';
  var nextEl=document.getElementById('rp-next');
  if(!playMoreMode){
    nextEl.textContent='Next daily flag in: '+fmt(getSecsUntilMidnight());
    countdownIv=setInterval(function(){
      var el=document.getElementById('rp-next');
      if(el)el.textContent='Next daily flag in: '+fmt(getSecsUntilMidnight());
    },1000);
  } else {
    nextEl.textContent='';
  }
  document.getElementById('country-input').disabled=true;
  document.getElementById('submit-btn').disabled=true;
  setTimeout(function(){document.getElementById('result-panel').classList.add('show');},400);
}

function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2200);
}

var input=document.getElementById('country-input');
var dropdown=document.getElementById('dropdown');

input.addEventListener('input',function(){
  var q=this.value.trim().toLowerCase();
  selCountry=null;
  document.getElementById('submit-btn').disabled=true;
  dropdown.innerHTML='';ddFocusIdx=-1;currentMatches=[];
  if(!q){dropdown.classList.remove('show');return;}
  currentMatches=COUNTRIES.filter(function(c){
    var name=c[1].toLowerCase();
    return name.startsWith(q)||name.split(' ').some(function(w){return w.startsWith(q);});
  }).slice(0,8);
  if(!currentMatches.length){dropdown.classList.remove('show');return;}
  currentMatches.forEach(function(c){
    var item=document.createElement('div');item.className='dd-item';
    item.textContent=c[1];
    item.addEventListener('mousedown',function(e){e.preventDefault();selectCountry(c);});
    dropdown.appendChild(item);
  });
  dropdown.classList.add('show');
});

input.addEventListener('keydown',function(e){
  var items=dropdown.querySelectorAll('.dd-item');
  if(e.key==='ArrowDown'){
    e.preventDefault();
    ddFocusIdx=Math.min(ddFocusIdx+1,items.length-1);
    items.forEach(function(el,i){el.classList.toggle('hi',i===ddFocusIdx);});
    if(ddFocusIdx>=0&&currentMatches[ddFocusIdx])input.value=currentMatches[ddFocusIdx][1];
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    ddFocusIdx=Math.max(ddFocusIdx-1,-1);
    items.forEach(function(el,i){el.classList.toggle('hi',i===ddFocusIdx);});
    if(ddFocusIdx>=0&&currentMatches[ddFocusIdx])input.value=currentMatches[ddFocusIdx][1];
  } else if(e.key==='Enter'){
    if(ddFocusIdx>=0&&currentMatches[ddFocusIdx]){selectCountry(currentMatches[ddFocusIdx]);}
    else if(selCountry){submitGuess();}
  } else if(e.key==='Escape'){
    dropdown.classList.remove('show');ddFocusIdx=-1;
  }
});

input.addEventListener('blur',function(){setTimeout(function(){dropdown.classList.remove('show');},150);});

function selectCountry(c){
  selCountry=c;input.value=c[1];
  dropdown.classList.remove('show');ddFocusIdx=-1;
  document.getElementById('submit-btn').disabled=false;
}

document.getElementById('submit-btn').addEventListener('click',submitGuess);
document.getElementById('rp-daily').addEventListener('click',function(){usedIndices=[];startGame(false);});
document.getElementById('rp-more').addEventListener('click',function(){startGame(true);});

usedIndices=[];
startGame(false);
</script>
